<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课表桌面工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-col">
          <h1 class="app-title">课表桌面工具</h1>
          <p id="filePathText" class="path-text">课表路径：加载中...</p>
        </div>

        <div class="date-col">
          <div id="currentDate" class="date-text">--</div>
        </div>

        <div class="action-col">
          <div class="week-nav" aria-label="周切换">
            <button id="prevWeekBtn" class="week-nav-btn" type="button" title="上一周">‹</button>
            <button id="currentWeekBtn" class="week-nav-btn week-nav-btn-main" type="button" title="回到本周">本周</button>
            <button id="nextWeekBtn" class="week-nav-btn" type="button" title="下一周">›</button>
          </div>
          <button id="addCourseBtn" class="add-course-btn" type="button" title="手动添加课程" aria-label="手动添加课程">+</button>
          <button id="menuToggleBtn" class="menu-toggle-btn" aria-expanded="false" aria-controls="topMenuPanel" title="打开菜单">
            ⋯
          </button>
          <div id="topMenuPanel" class="top-menu-panel hidden" role="menu">
            <button id="selectFileBtn" class="menu-item" type="button" role="menuitem">选择课表文件</button>
            <button id="reloadBtn" class="menu-item" type="button" role="menuitem">刷新课表</button>
            <button id="openFolderBtn" class="menu-item" type="button" role="menuitem">打开目录</button>
          </div>
        </div>
      </header>

      <div id="statusBanner" class="status-banner hidden"></div>

      <main class="timetable-main">
        <div id="weekGrid" class="week-grid-shell"></div>
      </main>

      <div id="addCourseModal" class="add-course-modal hidden" aria-hidden="true">
        <div class="add-course-backdrop" data-close-add-modal="true"></div>
        <div id="addCoursePanel" class="add-course-panel" role="dialog" aria-modal="true" aria-labelledby="addCourseTitle">
          <h2 id="addCourseTitle" class="add-course-title">手动添加课程</h2>
          <form id="addCourseForm" class="add-course-form" novalidate>
            <label class="field-label" for="manualDateInput">日期</label>
            <input id="manualDateInput" class="field-input" type="date" required />

            <label class="field-label" for="manualPeriodInput">节次</label>
            <select id="manualPeriodInput" class="field-input" required>
              <option value="1-2">1-2节</option>
              <option value="3-4">3-4节</option>
              <option value="5-6">5-6节</option>
              <option value="7-8">7-8节</option>
              <option value="9-10">9-10节</option>
            </select>

            <label class="field-label" for="manualSummaryInput">课程名称</label>
            <input id="manualSummaryInput" class="field-input" type="text" maxlength="64" placeholder="例如：高等数学" required />

            <label class="field-label" for="manualLocationInput">地点</label>
            <input id="manualLocationInput" class="field-input" type="text" maxlength="64" placeholder="例如：A302" />

            <div class="add-course-actions">
              <button id="deleteCourseBtn" class="dialog-btn dialog-btn-danger hidden" type="button">删除课程</button>
              <button id="cancelAddCourseBtn" class="dialog-btn" type="button">取消</button>
              <button id="confirmAddCourseBtn" class="dialog-btn dialog-btn-primary" type="submit">确认添加</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
